.plan-item {

  padding: 16px; box-shadow: var(--shadow-sm); cursor: pointer; transition: transform 0.15s;
}
.plan-item:active { transform:scale(0.98); }
.plan-item-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.plan-item-teams { font-size:17px; font-weight:600; display:flex; align-items:center; gap:8px; }
.plan-item-venue { font-size:13px; color:var(--secondary); display:flex; align-items:center; gap:4px; }
.plan-item-remove {
  font-size:12px; color:var(--danger); font-weight:500; cursor:pointer;
  padding:4px 8px; border-radius:6px; transition: background 0.15s;
}
.plan-item-remove:hover { background:rgba(255,59,48,0.08); }
.travel-suggestion {
  margin: 0 20px 12px; background: var(--accent-bg);
  border: 1px solid rgba(212,168,67,0.2); border-radius: var(--radius); padding: 16px;
}
.travel-suggestion-icon { font-size:24px; margin-bottom:8px; }
.travel-suggestion-title { font-size:15px; font-weight:600; margin-bottom:4px; }
.travel-suggestion-desc { font-size:13px; color:var(--secondary); line-height:1.4; margin-bottom:12px; }
.travel-options { display:flex; gap:8px; }
.travel-option {
  flex:1; padding:10px 8px; border-radius:10px; background:var(--surface);
  text-align:center; cursor:pointer; transition:all 0.2s; border: 1px solid var(--divider);
}
.travel-option:active { transform:scale(0.97); }
.travel-option-icon { font-size:20px; }
.travel-option-mode { font-size:11px; font-weight:600; margin-top:2px; }
.travel-option-time { font-size:11px; color:var(--secondary); }
.travel-option-eco { font-size:9px; color:var(--live); font-weight:600; }
@keyframes fadeInUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
.animate-in { animation: fadeInUp 0.4s ease both; }
.stagger-1 { animation-delay:0.05s; } .stagger-2 { animation-delay:0.1s; }
.leaflet-control-zoom { border:none!important; box-shadow:var(--shadow-md)!important; border-radius:10px!important; overflow:hidden; }
.leaflet-control-zoom a { width:36px!important; height:36px!important; line-height:36px!important; font-size:18px!important; color:var(--ink)!important; border:none!important; }
.venue-marker {
  width:36px; height:36px; background:var(--ink); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  border:3px solid #fff; box-shadow:0 2px 8px rgba(0,0,0,0.2);
  font-size:16px; cursor:pointer; transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.venue-marker:hover { transform:scale(1.15); }
.venue-marker.active { background:var(--accent); transform:scale(1.2); }
.poi-marker {
  width:28px; height:28px; background:var(--surface); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  border:2px solid var(--divider); box-shadow:0 1px 4px rgba(0,0,0,0.1); font-size:12px;
}
::-webkit-scrollbar { display:none; }
</style>

function showMatchDetail(i){const m=matches[i];if(!m)return;document.getElementById('md-content').innerHTML=`<div class="match-detail-hero"><div class="md-stage">${m.stage}</div><div class="md-teams"><div class="md-team"><span class="md-team-flag">${m.homeFlag}</span><span class="md-team-name">${m.home}</span></div><span class="md-vs">VS</span><div class="md-team"><span class="md-team-flag">${m.awayFlag}</span><span class="md-team-name">${m.away}</span></div></div><div class="md-info"><div class="md-info-row"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>${m.time} local · ${m.timeAlt}</div><div class="md-info-row"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>${m.date}</div><div class="md-info-row"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>${m.venue}, ${m.city}</div></div></div><div class="md-actions"><button class="md-btn-add" onclick="togglePlan(this)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Add to My Plan</button><button class="md-btn-dir" onclick="showDirectionsFromDetail(${i})"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>Directions</button></div><div class="md-section"><div class="md-section-title">Venue</div><div class="md-venue-card"><div class="md-venue-img">🏟️</div><div class="md-venue-info"><div class="md-venue-name">${m.venue}</div><div class="md-venue-loc">${m.city}</div></div></div></div><div class="md-section"><div class="md-section-title">Head to Head</div><div class="card" style="display:flex;justify-content:space-around;text-align:center;"><div><div style="font-size:24px;font-weight:700;">12</div><div class="caption text-secondary">${m.home} wins</div></div><div><div style="font-size:24px;font-weight:700;">5</div><div class="caption text-secondary">Draws</div></div><div><div style="font-size:24px;font-weight:700;">8</div><div class="caption text-secondary">${m.away} wins</div></div></div></div><div class="md-section"><div class="md-section-title">Nearby</div><div class="card" style="padding:0;"><div class="venue-list-item"><div class="venue-list-icon">🎉</div><div class="venue-list-info"><div class="venue-list-name">Official Fan Zone</div><div class="venue-list-meta">0.8 km from venue</div></div></div><div class="venue-list-item"><div class="venue-list-icon">🚉</div><div class="venue-list-info"><div class="venue-list-name">Nearest Transit Hub</div><div class="venue-list-meta">0.4 km from venue</div></div></div><div class="venue-list-item" style="border:none;"><div class="venue-list-icon">🛍️</div><div class="venue-list-info"><div class="venue-list-name">FIFA Official Store</div><div class="venue-list-meta">1.2 km from venue</div></div></div></div></div><div style="height:40px;"></div>`;showSubScreen('match-detail');}
function togglePlan(btn){if(btn.classList.contains('added')){btn.classList.remove('added');btn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Add to My Plan';}else{btn.classList.add('added');btn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>Added to Plan';}}
function showDirectionsFromDetail(i){hideSubScreen('match-detail');switchTab(2);setTimeout(()=>{if(mainMap){const m=matches[i],v=venues.find(vv=>vv.name===m.venue);if(v){mainMap.setView([v.lat,v.lng],13);showRouteOnMap(v);}}},400);}
function initMap(){mainMap=L.map('main-map',{center:[35,-95],zoom:4,zoomControl:false,attributionControl:false});L.control.zoom({position:'bottomright'}).addTo(mainMap);L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(mainMap);venues.forEach((v,i)=>{const icon=L.divIcon({className:'',html:'<div class="venue-marker" data-idx="'+i+'">⚽</div>',iconSize:[36,36],iconAnchor:[18,18]});L.marker([v.lat,v.lng],{icon}).addTo(mainMap).on('click',()=>showVenuePopup(i));});pois.forEach(p=>{const icon=L.divIcon({className:'',html:'<div class="poi-marker">'+p.emoji+'</div>',iconSize:[28,28],iconAnchor:[14,14]});L.marker([p.lat,p.lng],{icon}).addTo(mainMap);});document.getElementById('venue-list').innerHTML=venues.map((v,i)=>'<div class="venue-list-item" onclick="event.stopPropagation();flyToVenue('+i+')"><div class="venue-list-icon">'+v.emoji+'</div><div class="venue-list-info"><div class="venue-list-name">'+v.name+'</div><div class="venue-list-meta">'+v.city+' · '+v.capacity+'</div></div><span class="venue-list-arrow">›</span></div>').join('');mapInitialized=true;}
function flyToVenue(i){mainMap.flyTo([venues[i].lat,venues[i].lng],14,{duration:1});document.getElementById('map-sheet').classList.remove('expanded');setTimeout(()=>showVenuePopup(i),600);}
function showVenuePopup(i){currentVenueIdx=i;const v=venues[i];document.getElementById('popup-name').textContent=v.name;document.getElementById('popup-city').textContent=v.city+' · Capacity '+v.capacity;const vm=matches.filter(m=>m.venue===v.name);document.getElementById('popup-matches').innerHTML=vm.map(m=>'<div class="venue-popup-match"><span class="venue-popup-match-teams">'+m.homeFlag+' '+m.home+' vs '+m.away+' '+m.awayFlag+'</span><span class="venue-popup-match-time">'+m.time+' · '+m.date.split(', ')[1]+'</span></div>').join('');document.getElementById('venue-popup').classList.add('visible');document.getElementById('route-panel').classList.remove('visible');document.querySelectorAll('.venue-marker').forEach(m=>m.classList.remove('active'));const mk=document.querySelector('.venue-marker[data-idx="'+i+'"]');if(mk)mk.classList.add('active');}
function hideVenuePopup(){document.getElementById('venue-popup').classList.remove('visible');document.querySelectorAll('.venue-marker').forEach(m=>m.classList.remove('active'));}
function showRouteToVenue(){showRouteOnMap(venues[currentVenueIdx]);}
function showRouteOnMap(v){hideVenuePopup();document.getElementById('route-dest-name').textContent=v.name;document.getElementById('route-panel').classList.add('visible');if(routeLayer)mainMap.removeLayer(routeLayer);const s=[v.lat+0.04,v.lng-0.03],m1=[v.lat+0.02,v.lng-0.02],m2=[v.lat+0.01,v.lng-0.005];routeLayer=L.polyline([s,m1,m2,[v.lat,v.lng]],{color:'#1A1A1A',weight:4,opacity:0.8,dashArray:'8 6',smoothFactor:1}).addTo(mainMap);L.marker(s,{icon:L.divIcon({className:'',html:'<div style="width:12px;height:12px;background:#D4A843;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.3);"></div>',iconSize:[12,12],iconAnchor:[6,6]})}).addTo(mainMap);mainMap.fitBounds(routeLayer.getBounds(),{padding:[80,40]});}
function hideRoute(){document.getElementById('route-panel').classList.remove('visible');if(routeLayer){mainMap.removeLayer(routeLayer);routeLayer=null;}}
function selectRouteMode(el){el.parentElement.querySelectorAll('.route-mode').forEach(m=>m.classList.remove('active'));el.classList.add('active');}
function showMatchFromPopup(){const m=matches.find(m=>m.venue===venues[currentVenueIdx].name);if(m){hideVenuePopup();showMatchDetail(m.id);}}
function toggleSheet(){document.getElementById('map-sheet').classList.toggle('expanded');}
function filterPill(el){el.parentElement.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');}
function showTeamProfile(ti){const t=teams[ti];if(!t)return;const hs=t.squad&&t.squad.length>0;document.getElementById('tp-content').innerHTML='<div class="team-profile-hero"><div class="tp-flag">'+t.flag+'</div><div class="tp-name">'+t.name+'</div><div class="tp-info">Group '+t.group+' · FIFA Ranking #'+t.ranking+' · Coach: '+t.coach+'</div></div><div class="tp-tabs"><div class="tp-tab active" onclick="switchTeamTab(this,0)">Overview</div>'+(hs?'<div class="tp-tab" onclick="switchTeamTab(this,1)">Formation</div>':'')+'<div class="tp-tab" onclick="switchTeamTab(this,2)">Fixtures</div></div><div id="tp-tab-0" class="tp-tab-content active" style="padding:20px;"><div class="headline mb-12">Group '+t.group+' Standing</div><div class="card" style="padding:0;overflow:hidden;"><div style="display:grid;grid-template-columns:24px auto 1fr repeat(4,28px);padding:10px 12px;font-size:11px;font-weight:600;color:var(--tertiary);align-items:center;"><span></span><span></span><span></span><span style="text-align:center">W</span><span style="text-align:center">D</span><span style="text-align:center">L</span><span style="text-align:center">Pts</span></div>'+getGroupTeams(t.group).map((gt,i)=>'<div style="display:grid;grid-template-columns:24px auto 1fr repeat(4,28px);padding:10px 12px;font-size:14px;align-items:center;border-top:0.5px solid var(--divider);'+(gt.name===t.name?'background:var(--accent-bg);':'')+'"><span style="font-size:12px;color:var(--tertiary);">'+(i+1)+'</span><span style="margin-right:6px;">'+gt.flag+'</span><span style="font-weight:'+(gt.name===t.name?'700':'500')+'">'+gt.name+'</span><span style="text-align:center">0</span><span style="text-align:center">0</span><span style="text-align:center">0</span><span style="text-align:center;font-weight:700;">0</span></div>').join('')+'</div>'+(hs?'<div class="headline mb-12 mt-24">Squad</div><div class="card" style="padding:0;overflow:hidden;">'+t.squad.map(p=>'<div style="display:flex;align-items:center;padding:12px 14px;border-bottom:0.5px solid var(--divider);cursor:pointer;" onclick="showPlayerCard('+ti+','+p.num+')"><span style="width:28px;font-size:14px;font-weight:700;color:var(--tertiary);">'+p.num+'</span><span style="flex:1;font-size:15px;font-weight:500;">'+p.name+'</span><span style="font-size:12px;color:var(--secondary);padding:4px 10px;background:var(--bg);border-radius:6px;">'+p.pos+'</span></div>').join('')+'</div>':'<div style="padding:40px;text-align:center;color:var(--secondary);">Full squad details coming soon</div>')+'</div>'+(hs?'<div id="tp-tab-1" class="tp-tab-content"><div class="formation-container"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;"><div><div class="headline">'+t.formation+' Formation</div><div class="footnote text-secondary">Tap a player to view details</div></div><span class="badge badge-upcoming">'+t.flag+' '+t.name+'</span></div><div class="pitch" id="pitch-'+ti+'"><div class="pitch-lines"><div class="pitch-line pitch-center-line"></div><div class="pitch-line pitch-center-circle"></div><div class="pitch-line pitch-center-dot"></div><div class="pitch-line pitch-box-top"></div><div class="pitch-line pitch-box-bottom"></div><div class="pitch-line pitch-goal-top"></div><div class="pitch-line pitch-goal-bottom"></div></div>'+t.squad.map((p,j)=>{const pos=formationPositions['4-3-3'][j];return'<div class="player-dot '+(j===0?'keeper':'outfield')+'" style="left:'+pos.x+'%;top:'+pos.y+'%;" onclick="showPlayerCard('+ti+','+p.num+')">'+p.num+'<span class="player-dot-name">'+p.name.split(' ').pop()+'</span></div>';}).join('')+'</div></div></div>':'')+'<div id="tp-tab-2" class="tp-tab-content" style="padding:20px;"><div class="headline mb-12">Upcoming Fixtures</div>'+getTeamFixtures(t.name).map(m=>'<div class="match-card" style="margin:0 0 12px;" onclick="showMatchDetail('+m.id+')"><div class="match-card-top"><span class="match-card-stage">'+m.stage+'</span><span class="badge badge-upcoming">'+m.countdown+'</span></div><div class="match-card-body"><div class="match-team"><span class="flag-sm">'+m.homeFlag+'</span><span class="match-team-name">'+m.home+'</span></div><div class="match-score-time"><span class="match-time">'+m.time+'</span></div><div class="match-team right"><span class="flag-sm">'+m.awayFlag+'</span><span class="match-team-name">'+m.away+'</span></div></div><div class="match-venue"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>'+m.venue+', '+m.city+'</div></div>').join('')+'</div>';showSubScreen('team-profile');if(hs)setTimeout(()=>animateFormation(ti),100);}
function switchTeamTab(el,idx){el.parentElement.querySelectorAll('.tp-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');document.querySelectorAll('.tp-tab-content').forEach(c=>c.classList.remove('active'));const tab=document.getElementById('tp-tab-'+idx);if(tab)tab.classList.add('active');if(idx===1){const n=document.querySelector('.tp-name');if(n){const ti=teams.findIndex(t=>t.name===n.textContent);if(ti>=0)animateFormation(ti);}}}
function animateFormation(ti){const p=document.getElementById('pitch-'+ti);if(!p)return;p.querySelectorAll('.player-dot').forEach((d,i)=>{d.classList.remove('visible');setTimeout(()=>d.classList.add('visible'),80+i*60);});}
function getGroupTeams(g){return teams.filter(t=>t.group===g);}
function getTeamFixtures(n){return matches.filter(m=>m.home===n||m.away===n);}
function showPlayerCard(ti,num){const t=teams[ti];if(!t||!t.squad)return;const p=t.squad.find(s=>s.num===num);if(!p)return;document.getElementById('pc-num').textContent=p.num;document.getElementById('pc-name').textContent=p.name;document.getElementById('pc-pos').textContent=p.pos+' · '+p.club;document.getElementById('pc-caps').textContent=p.caps;document.getElementById('pc-goals').textContent=p.goals;document.getElementById('pc-assists').textContent=p.assists;document.getElementById('player-overlay').classList.add('visible');}
function hidePlayerCard(){document.getElementById('player-overlay').classList.remove('visible');}
document.addEventListener('DOMContentLoaded',()=>{const n=new Date();document.querySelector('.status-bar .time').textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');});
<\/script>
</body>
</html>
