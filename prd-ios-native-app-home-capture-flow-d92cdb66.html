<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App Prototype</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f7;
            overflow: hidden;
        }

        .device-frame {
            width: 375px;
            height: 812px;
            margin: 20px auto;
            background: #fff;
            border-radius: 40px;
            border: 12px solid #000;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .status-bar {
            height: 44px;
            background: #f5f5f7;
            border-bottom: 1px solid #e5e5ea;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 12px;
            color: #000;
            font-weight: 600;
        }

        .status-bar-left, .status-bar-right {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .screen-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            display: flex;
        }

        .screen {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        .screen-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch;
        }

        /* Home Screen */
        .home-header {
            padding: 16px;
            background: #f5f5f7;
            border-bottom: 1px solid #e5e5ea;
        }

        .home-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #000;
        }

        .search-bar {
            width: 100%;
            height: 36px;
            background: #e5e5ea;
            border-radius: 10px;
            border: none;
            padding: 0 12px;
            font-size: 16px;
            color: #000;
        }

        .search-bar::placeholder {
            color: #999;
        }

        .section {
            padding: 16px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .note-item {
            background: #fff;
            border: 1px solid #e5e5ea;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .note-item:active {
            background: #f9f9f9;
            transform: scale(0.98);
        }

        .note-item-title {
            font-size: 16px;
            font-weight: 600;
            color: #000;
            margin-bottom: 4px;
        }

        .note-item-preview {
            font-size: 13px;
            color: #666;
            line-height: 1.4;
            max-height: 40px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .note-item-meta {
            font-size: 11px;
            color: #999;
            margin-top: 6px;
        }

        .ai-suggestions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .suggestion-chip {
            background: #fff;
            border: 1px solid #e5e5ea;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 12px;
            color: #007AFF;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .suggestion-chip:active {
            background: #f0f7ff;
            transform: scale(0.95);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: #999;
            text-align: center;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.3;
        }

        .empty-state-text {
            font-size: 14px;
            color: #999;
        }

        /* Capture Screen */
        .capture-header {
            padding: 16px;
            background: #f5f5f7;
            border-bottom: 1px solid #e5e5ea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .capture-header-title {
            font-size: 18px;
            font-weight: 600;
            color: #000;
        }

        .close-btn {
            font-size: 24px;
            color: #007AFF;
            cursor: pointer;
            padding: 8px;
            margin-right: -8px;
        }

        .capture-form {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .capture-title {
            font-size: 16px;
            border: 1px solid #e5e5ea;
            border-radius: 8px;
            padding: 12px;
            font-family: inherit;
            color: #000;
        }

        .capture-body {
            flex: 1;
            font-size: 14px;
            border: 1px solid #e5e5ea;
            border-radius: 8px;
            padding: 12px;
            font-family: inherit;
            color: #000;
            resize: none;
            -webkit-appearance: none;
        }

        .ai-actions {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 0;
            -webkit-overflow-scrolling: touch;
        }

        .ai-action-btn {
            flex-shrink: 0;
            background: #fff;
            border: 1px solid #e5e5ea;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: #007AFF;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .ai-action-btn:active {
            background: #f0f7ff;
            transform: scale(0.95);
        }

        .ai-action-btn.loading {
            background: #f0f7ff;
            opacity: 0.6;
        }

        .capture-actions {
            display: flex;
            gap: 8px;
            padding-top: 16px;
            border-top: 1px solid #e5e5ea;
        }

        .btn-primary {
            flex: 1;
            height: 44px;
            background: #007AFF;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary:active {
            background: #0051d5;
            transform: scale(0.98);
        }

        .btn-primary:disabled {
            background: #ccc;
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            flex: 1;
            height: 44px;
            background: #f5f5f7;
            color: #007AFF;
            border: 1px solid #e5e5ea;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-secondary:active {
            background: #e5e5ea;
            transform: scale(0.98);
        }

        /* Recents Screen */
        .recents-header {
            padding: 16px;
            background: #f5f5f7;
            border-bottom: 1px solid #e5e5ea;
        }

        .recents-title {
            font-size: 32px;
            font-weight: 700;
            color: #000;
        }

        .notes-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .note-list-item {
            background: #fff;
            border-bottom: 1px solid #f5f5f7;
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .note-list-item:active {
            background: #f9f9f9;
        }

        .note-list-content {
            flex: 1;
            min-width: 0;
        }

        .note-list-title {
            font-size: 16px;
            font-weight: 600;
            color: #000;
            margin-bottom: 4px;
        }

        .note-list-preview {
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
            line-height: 1.3;
            max-height: 32px;
            overflow: hidden;
        }

        .note-list-date {
            font-size: 11px;
            color: #999;
        }

        .offline-badge {
            font-size: 10px;
            background: #f0f0f0;
            color: #666;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
            flex-shrink: 0;
        }

        /* Read Screen */
        .read-header {
            padding: 12px 16px;
            background: #f5f5f7;
            border-bottom: 1px solid #e5e5ea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .read-back-btn {
            font-size: 20px;
            color: #007AFF;
            cursor: pointer;
            padding: 8px;
            margin-left: -8px;
        }

        .read-content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 16px;
        }

        .read-title {
            font-size: 24px;
            font-weight: 700;
            color: #000;
            margin-bottom: 12px;
        }

        .read-meta {
            font-size: 12px;
            color: #999;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e5e5ea;
        }

        .read-body {
            font-size: 14px;
            color: #333;
            line-height: 1.6;
        }

        /* Tab Bar */
        .tab-bar {
            height: 50px;
            background: #fff;
            border-top: 1px solid #e5e5ea;
            display: flex;
            justify-content: space-around;
            align-items: stretch;
        }

        .tab {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            cursor: pointer;
            transition: opacity 0.2s ease;
            color: #999;
            font-size: 10px;
            font-weight: 600;
        }

        .tab.active {
            color: #007AFF;
        }

        .tab-icon {
            font-size: 24px;
        }

        /* Hub Panel */
        .hub-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0);
            transition: background 0.3s ease;
            pointer-events: none;
            z-index: 50;
        }

        .hub-overlay.active {
            background: rgba(0,0,0,0.4);
            pointer-events: auto;
        }

        .hub-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 80%;
            height: 100%;
            background: #fff;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            z-index: 51;
        }

        .hub-panel.active {
            transform: translateX(0);
        }

        .hub-header {
            padding: 20px 16px;
            background: #f5f5f7;
            border-bottom: 1px solid #e5e5ea;
        }

        .hub-title {
            font-size: 24px;
            font-weight: 700;
            color: #000;
        }

        .hub-content {
            padding: 16px;
        }

        .hub-item {
            padding: 16px;
            background: #f5f5f7;
            border
