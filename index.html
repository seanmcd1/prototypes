<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prototypes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; min-height: 100vh; padding: 40px 24px; }
  h1 { font-size: 28px; font-weight: 600; color: #1d1d1f; margin-bottom: 8px; }
  .subtitle { font-size: 15px; color: #6e6e73; margin-bottom: 40px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .card { background: #fff; border-radius: 12px; padding: 20px 24px; text-decoration: none; color: inherit; border: 1px solid #e5e5ea; transition: box-shadow 0.2s, transform 0.2s; display: block; }
  .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.08); transform: translateY(-2px); }
  .card-title { font-size: 15px; font-weight: 500; color: #1d1d1f; margin-bottom: 6px; line-height: 1.4; }
  .card-meta { font-size: 13px; color: #6e6e73; }
  .badge { display: inline-block; background: #f0f0f5; color: #6e6e73; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-top: 12px; }
  .empty { text-align: center; padding: 80px 20px; color: #6e6e73; }
</style>
</head>
<body>
<h1>Prototypes</h1>
<p class="subtitle">Auto-generated from Notion PRDs</p>
<div class="grid" id="grid">
  <div class="empty">Loading prototypes...</div>
</div>
<script>
const REPO = 'seanmcd1/prototypes';
const BASE = 'https://seanmcd1.github.io/prototypes/';

async function load() {
  const res = await fetch(`https://api.github.com/repos/${REPO}/contents/`);
  const files = await res.json();
  const html = files.filter(f => f.name.endsWith('.html') && f.name !== 'index.html');

  const grid = document.getElementById('grid');
  if (!html.length) { grid.innerHTML = '<div class="empty">No prototypes yet.</div>'; return; }

  grid.innerHTML = html.reverse().map(f => {
    const name = f.name.replace(/\.html$/, '').replace(/-[a-f0-9]{8}$/, '').replace(/-/g, ' ');
    const title = name.charAt(0).toUpperCase() + name.slice(1);
    return `<a class="card" href="${BASE}${f.name}" target="_blank">
      <div class="card-title">${title}</div>
      <div class="badge">HTML prototype</div>
    </a>`;
  }).join('');
}

load();
</script>
</body>
</html>
