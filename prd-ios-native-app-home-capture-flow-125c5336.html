<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            overflow: hidden;
        }

        .phone-frame {
            width: 375px;
            height: 667px;
            margin: 20px auto;
            background: white;
            border-radius: 40px;
            border: 12px solid #000;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 28px;
            background: #000;
            border-radius: 0 0 40px 40px;
            z-index: 100;
        }

        .status-bar {
            height: 44px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            border-bottom: 1px solid #e5e5e5;
            font-size: 12px;
            color: #333;
        }

        .status-left, .status-right {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .screen-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
            position: relative;
        }

        .screen {
            display: none;
            height: 100%;
            padding: 16px;
            position: absolute;
            width: 100%;
            top: 0;
            animation: fadeIn 0.3s ease-in;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* HOME SCREEN */
        .home-header {
            margin-bottom: 20px;
        }

        .home-title {
            font-size: 32px;
            font-weight: 700;
            color: #000;
            margin-bottom: 4px;
        }

        .home-subtitle {
            font-size: 14px;
            color: #666;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: #f0f0f0;
            border-radius: 10px;
            padding: 8px 12px;
            margin-bottom: 20px;
            gap: 8px;
        }

        .search-bar input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 16px;
            outline: none;
        }

        .section-label {
            font-size: 13px;
            font-weight: 600;
            color: #666;
            margin-top: 16px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .note-item {
            background: white;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .note-item:active {
            background: #f9f9f9;
            transform: scale(0.98);
        }

        .note-item-title {
            font-size: 16px;
            font-weight: 600;
            color: #000;
            margin-bottom: 4px;
        }

        .note-item-preview {
            font-size: 13px;
            color: #999;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .note-item-date {
            font-size: 12px;
            color: #bbb;
            margin-top: 6px;
        }

        .ai-suggestions {
            background: #f9f9f9;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            padding: 12px;
            margin-top: 16px;
        }

        .ai-label {
            font-size: 13px;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ai-suggestion-item {
            background: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            color: #333;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ai-suggestion-item:last-child {
            margin-bottom: 0;
        }

        .ai-suggestion-item:active {
            background: #e8f4ff;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
            color: #999;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-title {
            font-size: 16px;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
        }

        /* CAPTURE SCREEN */
        .capture-header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .capture-title {
            font-size: 24px;
            font-weight: 700;
        }

        .close-btn {
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            color: #666;
            background: none;
            border: none;
        }

        .form-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }

        .form-input {
            border: 1px solid #e5e5e5;
            border-radius: 10px;
            padding: 12px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            border-color: #007AFF;
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        #captureTitle {
            font-weight: 600;
            font-size: 18px;
        }

        #captureBody {
            min-height: 200px;
            resize: none;
            vertical-align: top;
        }

        .save-btn {
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
            margin-bottom: 80px;
        }

        .save-btn:active {
            background: #0051D5;
            transform: scale(0.98);
        }

        .save-btn.loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .ai-actions {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 12px;
            margin-top: 16px;
        }

        .ai-actions-label {
            font-size: 12px;
            font-weight: 600;
            color: #999;
            margin-bottom: 8px;
        }

        .ai-action {
            background: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            color: #333;
            margin-bottom: 6px;
            cursor: pointer;
            border: 1px solid #e5e5e5;
            transition: all 0.2s;
        }

        .ai-action:last-child {
            margin-bottom: 0;
        }

        .ai-action:active {
            background: #e8f4ff;
            border-color: #007AFF;
        }

        /* RECENTS SCREEN */
        .recents-header {
            margin-bottom: 16px;
        }

        .recents-title {
            font-size: 32px;
            font-weight: 700;
            color: #000;
        }

        .note-read {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e5e5e5;
        }

        .note-read-title {
            font-size: 24px;
            font-weight: 700;
            color: #000;
            margin-bottom: 12px;
        }

        .note-read-date {
            font-size: 13px;
            color: #999;
            margin-bottom: 16px;
        }

        .note-read-body {
            font-size: 16px;
            line-height: 1.5;
            color: #333;
        }

        .note-read-badge {
            display: inline-block;
            background: #e8f4ff;
            color: #007AFF;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: 12px;
        }

        /* TAB BAR */
        .tab-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: white;
            border-top: 1px solid #e5e5e5;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 50;
        }

        .tab-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 10px;
            color: #999;
            transition: all 0.2s;
            flex: 1;
            height: 100%;
        }

        .tab-btn.active {
            color: #007AFF;
        }

        .tab-icon {
            font-size: 24px;
        }

        .tab-label {
            font-size: 10px;
            font-weight: 500;
        }

        /* DRAWER/HUB */
        .drawer-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 60;
            animation: fadeIn 0.3s;
        }

        .drawer-overlay.active {
            display: block;
        }

        .drawer {
            position: fixed;
            left: -280px;
            top: 0;
            width: 280px;
            height: 100vh;
            background: white;
            z-index: 70;
            transition: left 0.3s ease-out;
            overflow-y: auto;
        }

        .drawer.active {
            left: 0;
        }

        .drawer-header {
            padding: 20px 16px;
            border-bottom: 1px solid #e5e5e5;
            font-size: 20px;
            font-weight: 700;
            color: #000;
        }

        .drawer-item {
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #333;
            font-size: 16px;
        }

        .drawer-item:active {
            background: #f9f9f9;
        }

        .drawer-icon {
            font-size: 20px;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 40;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .toast.show {
            opacity: 1;
        }

        .toast.error {
            background: #ff3b30;
        }

        .toast.success {
            background: #34c759;
        }

        .offline-indicator {
            display: none;
            background: #fff3cd;
            color: #856404;
            padding: 8px 12px;
            font-size: 12px;
            text-align: center;
            border-bottom: 1px solid #ffc107;
        }

        .offline-indicator.show {
            display: block;
        }

        /* LOADING */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #e5e5e5;
            border-top: 2px solid #007AFF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="notch"></div>

        <div class="offline-indicator" id="offlineIndicator">
            📡 Offline mode — changes will sync when online
        </div>

        <div class="status-bar">
            <div class="status-left">
                <span>9:41</span>
            </div>
            <div class="status-right">
                <span>📶</span>
                <span>🔋</span>
